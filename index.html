<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>교실 동물 탐험대</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f7ff;min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}
h1{font-size:26px;font-weight:700;color:#2d5be3;margin-bottom:8px;text-align:center}
h2{font-size:20px;font-weight:700;color:#2d5be3;margin-bottom:12px;text-align:center}
.sub{font-size:14px;color:#666;text-align:center;margin-bottom:20px;line-height:1.7}
input[type=text]{width:100%;max-width:300px;padding:14px;font-size:18px;border:2px solid #b3c9ff;border-radius:14px;outline:none;text-align:center;background:#fff}
input[type=text]:focus{border-color:#2d5be3}
.btn{padding:14px;font-size:16px;font-weight:700;border:none;border-radius:18px;cursor:pointer;margin-top:10px;width:100%;max-width:300px;display:block}
.btn-primary{background:#2d5be3;color:#fff}
.btn-secondary{background:#fff;color:#2d5be3;border:2px solid #2d5be3}
.btn-danger{background:#fff;color:#e53935;border:2px solid #e53935;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e0eaff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;width:100%;position:fixed;top:0;left:0;z-index:10}
.tb-name{font-size:14px;font-weight:700;color:#2d5be3}
.tb-count{font-size:13px;color:#666}
.has-topbar{padding-top:60px}

/* 스캔 카메라 */
#cam-wrap{position:relative;width:100%;max-width:340px;border-radius:16px;overflow:hidden;background:#000;margin-bottom:10px}
#cam-video{width:100%;display:block;max-height:260px;object-fit:cover}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:180px;height:180px;border:3px solid #fff;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.4);position:relative}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:#2d5be3;border-radius:2px;animation:sl 2s linear infinite}
@keyframes sl{0%{top:4px}100%{top:calc(100% - 4px)}}

/* AR 전체화면 */
#ar-screen{display:none;position:fixed;inset:0;z-index:100;background:#000;overflow:hidden}
#ar-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#ar-animal{position:absolute;font-size:90px;cursor:pointer;user-select:none;line-height:1;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,.7));
  transform:translate(-50%,-50%)}
#ar-animal.popping{animation:ar-pop 0.5s cubic-bezier(.17,.67,.35,1.5) forwards}
@keyframes ar-pop{0%{transform:translate(-50%,-50%) scale(0) rotate(-20deg)}60%{transform:translate(-50%,-50%) scale(1.3) rotate(5deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}
@keyframes idle-bounce{0%,100%{margin-top:0}40%{margin-top:-16px}70%{margin-top:-8px}}
@keyframes idle-spin{0%,100%{rotate:0deg}50%{rotate:20deg}}
@keyframes idle-shake{0%,100%{rotate:0deg}30%{rotate:-15deg}70%{rotate:15deg}}
@keyframes idle-float{0%,100%{margin-top:0}50%{margin-top:-12px}}
@keyframes idle-wiggle{0%,100%{scale:1}50%{scale:1.15}}
.idle-bounce{animation:idle-bounce 0.6s ease-in-out infinite}
.idle-spin{animation:idle-spin 0.7s ease-in-out infinite}
.idle-shake{animation:idle-shake 0.5s ease-in-out infinite}
.idle-float{animation:idle-float 1.4s ease-in-out infinite}
.idle-wiggle{animation:idle-wiggle 0.6s ease-in-out infinite}

/* AR HUD */
#ar-hud{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
#ar-title{color:#fff;font-size:16px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.8)}
#ar-close-btn{display:none;background:rgba(255,100,100,.85);color:#fff;border:none;font-size:14px;font-weight:700;padding:10px 18px;border-radius:20px;cursor:pointer;backdrop-filter:blur(4px)}
#ar-hint{position:absolute;bottom:0;left:0;right:0;padding:14px;text-align:center;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);transition:background .3s}
#ar-hint.inview{background:linear-gradient(to top,rgba(45,91,227,.7),transparent)}
#ar-radar{position:absolute;bottom:70px;right:16px;width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.3)}
#ar-radar-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#ff4455;box-shadow:0 0 8px #ff4455;transform:translate(-50%,-50%)}
#ar-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
#ar-crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:.5}
#ar-crosshair::before,#ar-crosshair::after{content:'';position:absolute;background:#fff}
#ar-crosshair::before{width:1px;height:40px;left:50%;transform:translateX(-50%)}
#ar-crosshair::after{height:1px;width:40px;top:50%;transform:translateY(-50%)}

/* 포획/도감 */
.cap-emoji{font-size:100px;animation:pop .5s ease-out;display:block;text-align:center;margin-bottom:4px}
@keyframes pop{0%{transform:scale(0) rotate(-15deg);opacity:0}70%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1);opacity:1}}
.cap-title{font-size:22px;font-weight:700;color:#2d5be3;text-align:center;margin-bottom:6px}
.cap-desc{font-size:14px;color:#666;text-align:center;max-width:260px;line-height:1.6;margin-bottom:6px}
.cap-new{font-size:13px;font-weight:700;color:#ff6b00;text-align:center;margin-bottom:16px}
.sparkle{font-size:28px;animation:spin 1.5s linear infinite;display:block;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.already{background:#fff3e0;border:2px solid #ffb74d;border-radius:14px;padding:16px;text-align:center;max-width:300px;width:100%;margin-bottom:16px}
.already .em{font-size:48px;display:block;margin-bottom:6px}
.already p{font-size:15px;color:#e65100;font-weight:700}
.already small{font-size:13px;color:#888}
.dex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:400px;margin-bottom:16px}
.dex-card{background:#fff;border-radius:12px;padding:10px 4px;text-align:center;border:2px solid #e0eaff}
.dex-card.caught{border-color:#2d5be3;background:#f0f4ff}
.dex-card.unknown{filter:grayscale(1);opacity:.35}
.dex-emoji{font-size:28px;display:block;margin-bottom:2px}
.dex-label{font-size:11px;font-weight:700;color:#333}
.dex-num{font-size:10px;color:#aaa}
.count-bar{background:#e0eaff;border-radius:10px;padding:7px 16px;font-size:14px;font-weight:700;color:#2d5be3;margin-bottom:16px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
#scan-msg{font-size:13px;color:#555;text-align:center;margin-bottom:8px;min-height:18px}
</style>
</head>
<body>

<!-- 시작 -->
<div class="screen active" id="s-start">
  <img src="logo.png" style="width:90px;height:90px;margin-bottom:10px;object-fit:contain">
  <h1>교실 동물 탐험대</h1>
  <p class="sub">교실 곳곳에 숨은 동물 친구들을<br>찾아서 포획해보세요!</p>
  <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="10">
  <button class="btn btn-primary" onclick="onStart()">탐험 시작!</button>
</div>

<!-- 스캔 -->
<div class="screen has-topbar" id="s-scan">
  <div class="topbar"><span class="tb-name" id="sc-name"></span><span class="tb-count" id="sc-count"></span></div>
  <h2>QR 코드를 찾아보세요!</h2>
  <p class="sub">교실에 붙어있는 QR에<br>카메라를 가까이 대세요</p>
  <div id="cam-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <div class="scan-frame" id="scan-frame"><div class="scan-box"><div class="scan-line"></div></div></div>
  </div>
  <canvas id="cam-canvas" style="display:none"></canvas>
  <p id="scan-msg">카메라 시작 중...</p>
  <button class="btn btn-secondary" onclick="goDex()">도감 보기</button>
</div>

<!-- AR 전체화면 -->
<div id="ar-screen">
  <video id="ar-bg" autoplay playsinline muted></video>
  <div id="ar-crosshair"></div>
  <span id="ar-animal" onclick="confirmCapture()"></span>
  <div id="ar-radar"><div id="ar-radar-dot"></div></div>
  <div id="ar-hud">
    <div id="ar-title"></div>
    <button id="ar-close-btn" onclick="closeAR()">✕</button>
  </div>
  <div id="ar-hint">태블릿을 기울여 동물을 쫓아가세요!</div>
  <div id="ar-flash"></div>
</div>

<!-- 포획 결과 -->
<div class="screen has-topbar" id="s-capture">
  <div class="topbar"><span class="tb-name" id="cp-name"></span><span class="tb-count" id="cp-count"></span></div>
  <div id="cap-content" style="width:100%;max-width:300px;text-align:center"></div>
  <button class="btn btn-primary" onclick="goScan()">계속 탐험하기</button>
  <button class="btn btn-secondary" onclick="goDex()">도감 보기</button>
</div>

<!-- 도감 -->
<div class="screen has-topbar" id="s-dex">
  <div class="topbar"><span class="tb-name" id="dx-name"></span><span class="tb-count" id="dx-count"></span></div>
  <div style="width:100%;display:flex;flex-direction:column;align-items:center;padding:16px 16px 40px">
    <h2>내 동물 도감</h2>
    <div class="count-bar" id="dx-bar"></div>
    <div class="dex-grid" id="dex-grid"></div>
    <button class="btn btn-secondary" onclick="goScan()">계속 탐험하기</button>
    <button class="btn btn-danger" onclick="resetGame()" style="margin-top:10px">처음부터 다시 시작</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var ANIMALS={
  fox:{emoji:'🦊',name:'꼬미여우',desc:'장난꾸러기 여우! 꼬리가 아주 복슬복슬해요.',idle:'idle-shake',speed:4},
  rabbit:{emoji:'🐰',name:'토끼별',desc:'달에서 온 토끼. 귀가 엄청 길어요!',idle:'idle-bounce',speed:5},
  penguin:{emoji:'🐧',name:'펭이',desc:'남극에서 온 친구. 춤을 아주 잘 춰요!',idle:'idle-wiggle',speed:2},
  frog:{emoji:'🐸',name:'초록이',desc:'연못의 수호자! 점프 실력이 최고예요.',idle:'idle-bounce',speed:5},
  bear:{emoji:'🐻',name:'구름곰',desc:'구름 위에서 내려온 포근한 곰.',idle:'idle-bounce',speed:2},
  cat:{emoji:'🐱',name:'냥냥이',desc:'새침하지만 사실 엄청 친해지고 싶어요.',idle:'idle-float',speed:3},
  star:{emoji:'🦄',name:'반짝이',desc:'별빛으로 만들어진 신비로운 유니콘!',idle:'idle-spin',speed:4},
  octopus:{emoji:'🐙',name:'문어몽',desc:'다리가 8개! 뭐든 척척 잡아드려요.',idle:'idle-wiggle',speed:2},
  lion:{emoji:'🦁',name:'사자왕',desc:'백수의 왕! 갈기가 멋있어요.',idle:'idle-shake',speed:3},
  panda:{emoji:'🐼',name:'판다롱',desc:'대나무를 엄청 좋아하는 귀요미!',idle:'idle-bounce',speed:2},
  dragon:{emoji:'🐲',name:'드래곤이',desc:'하늘을 나는 신비로운 용이에요.',idle:'idle-float',speed:6},
  hamster:{emoji:'🐹',name:'햄찌',desc:'볼 주머니에 뭐든 넣는 귀여운 친구!',idle:'idle-shake',speed:6},
  owl:{emoji:'🦉',name:'부엉부엉',desc:'밤의 수호자! 눈이 엄청 크답니다.',idle:'idle-float',speed:2},
  dolphin:{emoji:'🐬',name:'돌핀이',desc:'바다의 악동! 점프를 잘 해요.',idle:'idle-bounce',speed:5},
  turtle:{emoji:'🐢',name:'거북이',desc:'느리지만 끝까지 포기하지 않아요!',idle:'idle-float',speed:1},
  chick:{emoji:'🐥',name:'삐약이',desc:'막 태어난 아기 병아리예요. 너무 귀여워요!',idle:'idle-bounce',speed:4},
  koala:{emoji:'🐨',name:'코알라몽',desc:'유칼립투스만 먹는 호주 친구!',idle:'idle-float',speed:1},
  crab:{emoji:'🦀',name:'집게리',desc:'집게발로 뭐든 집을 수 있어요!',idle:'idle-shake',speed:3},
  elephant:{emoji:'🐘',name:'코끼리킹',desc:'코가 엄청 길어요. 기억력도 최고!',idle:'idle-bounce',speed:2},
  wolf:{emoji:'🐺',name:'늑대별',desc:'달밤에 우우~ 노래하는 멋진 친구!',idle:'idle-shake',speed:5},
  miss:{emoji:'❓',name:'동물을 놓쳤어요!',desc:'동물이 도망갔어요!',isMiss:true,idle:'',speed:0}
};

var player=null;
var camStream=null, camTimer=null, detector=null;
var cooldown=false, pendingCapture=null;
var arTimer=null, arWX=0, arWY=0, arVx=0, arVy=0;
var gyroX=0, gyroY=0, lastGamma=null, lastBeta=null;
var arEscTimer=null;

function savePlayer(){sessionStorage.setItem('p',JSON.stringify(player));}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function setTopbars(){
  if(!player)return;
  var cnt=player.caught.length+'/'+Object.keys(ANIMALS).length+' 포획';
  ['sc','cp','dx'].forEach(function(p){
    var n=document.getElementById(p+'-name'), c=document.getElementById(p+'-count');
    if(n)n.textContent=player.name+'의 탐험';
    if(c)c.textContent=cnt;
  });
}

// ── 시작 ──
function onStart(){
  var n=document.getElementById('name-input').value.trim();
  if(!n){toast('이름을 입력해 주세요!');return;}
  player={name:n,caught:[]};
  savePlayer();
  setTopbars();
  goScan();
}

// ── 스캔 ──
function goScan(){
  cooldown=false; pendingCapture=null;
  stopArMove(); stopGyro();
  setTopbars();
  show('s-scan');
  startCam();
}

function startCam(){
  stopCam();
  var msg=document.getElementById('scan-msg');
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var constraints={video:{facingMode:'environment'}};
  if(!isIOS){constraints.video.width={ideal:1280};constraints.video.height={ideal:720};}
  navigator.mediaDevices.getUserMedia(constraints).then(function(s){
    camStream=s;
    var v=document.getElementById('cam-video');
    v.srcObject=s; v.play();
    msg.textContent='QR을 화면 중앙에 맞춰보세요';
    if(!isIOS&&'BarcodeDetector' in window){
      detector=new BarcodeDetector({formats:['qr_code']});
      camTimer=setInterval(scanWithDetector,300);
    } else {
      loadJsQR(function(){camTimer=setInterval(scanWithJsQR,150);});
    }
  }).catch(function(){msg.textContent='카메라 권한을 허용해주세요';});
}

function loadJsQR(cb){
  if(window.jsQR){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
  s.onload=cb; document.head.appendChild(s);
}

function scanWithDetector(){
  if(cooldown)return;
  var v=document.getElementById('cam-video');
  if(!v.videoWidth)return;
  detector.detect(v).then(function(codes){if(codes.length>0)handleQR(codes[0].rawValue);}).catch(function(){});
}

function scanWithJsQR(){
  if(cooldown)return;
  var v=document.getElementById('cam-video'), c=document.getElementById('cam-canvas');
  if(!v.videoWidth)return;
  c.width=v.videoWidth; c.height=v.videoHeight;
  var ctx=c.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(v,0,0);
  var code=jsQR(ctx.getImageData(0,0,c.width,c.height).data,c.width,c.height,{inversionAttempts:'attemptBoth'});
  if(code)handleQR(code.data);
}

function handleQR(data){
  if(cooldown)return;
  cooldown=true;
  var m=data.match(/[?&]animal=([a-z]+)/);
  if(m&&ANIMALS[m[1]]){
    var id=m[1], a=ANIMALS[id];
    if(a.isMiss){stopCam();doCapture(id);}
    else{stopCam();showAR(id,a);}
  } else {
    document.getElementById('scan-msg').textContent='⚠️ 동물 QR이 아니에요!';
    setTimeout(function(){cooldown=false;},2000);
  }
}

function stopCam(){
  if(camTimer){clearInterval(camTimer);camTimer=null;}
  if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}
}

// ── AR ──
function showAR(id,a){
  pendingCapture=id;

  // 새 카메라 스트림을 AR 배경으로
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var constraints={video:{facingMode:'environment'}};
  if(!isIOS){constraints.video.width={ideal:1280};constraints.video.height={ideal:720};}
  navigator.mediaDevices.getUserMedia(constraints).then(function(s){
    camStream=s;
    var bg=document.getElementById('ar-bg');
    bg.srcObject=s; bg.play();
  }).catch(function(){});

  // 동물 초기 월드좌표 (화면 중심 기준 오프셋)
  var angle=Math.random()*Math.PI*2;
  arWX=Math.cos(angle)*60; arWY=Math.sin(angle)*60;
  var spd=a.speed||3;
  arVx=(Math.random()>0.5?1:-1)*spd;
  arVy=(Math.random()>0.5?1:-1)*spd;
  gyroX=0; gyroY=0; lastGamma=null; lastBeta=null;

  // AR 화면 표시
  document.getElementById('ar-title').textContent=a.name+' 출현!';
  var el=document.getElementById('ar-animal');
  el.textContent=a.emoji;
  el.style.left=(window.innerWidth/2)+'px';
  el.style.top=(window.innerHeight/2)+'px';
  el.className='popping';
  document.getElementById('ar-screen').style.display='block';

  setTimeout(function(){
    el.className=a.idle;
    startArMove(a);
    startGyro();
    // 5초 후 '놓친동물 다시잡기' 버튼 표시
    arEscTimer=setTimeout(function(){
      document.getElementById('ar-close-btn').style.display='block';
      document.getElementById('ar-close-btn').textContent='놓친 동물 다시잡기 🔄';
    },5000);
  },500);
}

function getARPos(){
  var W=window.innerWidth, H=window.innerHeight;
  return {
    x: W/2 + arWX - gyroX,
    y: H/2 + arWY - gyroY
  };
}

function updateARAnimal(){
  var pos=getARPos();
  var el=document.getElementById('ar-animal');
  el.style.left=pos.x+'px';
  el.style.top=pos.y+'px';

  // 방향에 따라 좌우 반전
  var baseTransform='translate(-50%,-50%)';
  if(arVx<0) baseTransform+=' scaleX(-1)';
  el.style.transform=baseTransform;

  // 레이더
  var dx=pos.x-window.innerWidth/2, dy=pos.y-window.innerHeight/2;
  var maxR=22, cx=32, cy=32;
  var len=Math.sqrt(dx*dx+dy*dy)||1;
  var rx=cx+Math.min(Math.abs(dx)/len,1)*Math.min(len/8,maxR)*(dx<0?-1:1);
  var ry=cy+Math.min(Math.abs(dy)/len,1)*Math.min(len/8,maxR)*(dy<0?-1:1);
  var dot=document.getElementById('ar-radar-dot');
  dot.style.left=Math.max(6,Math.min(58,rx))+'px';
  dot.style.top=Math.max(6,Math.min(58,ry))+'px';

  // 힌트
  var hint=document.getElementById('ar-hint');
  var inView=pos.x>40&&pos.x<window.innerWidth-40&&pos.y>80&&pos.y<window.innerHeight-80;
  hint.textContent=inView?'동물을 탭해서 포획하세요!':'📡 태블릿을 기울여 동물을 쫓아가세요!';
  hint.className=inView?'inview':'';
}

function startArMove(a){
  stopArMove();
  // 동물이 카메라를 피해 도망다니는 로직
  arTimer=setInterval(function(){
    var W=window.innerWidth, H=window.innerHeight;
    var pos=getARPos();

    // 화면 안에 있으면 도망치려고 함
    var inView=pos.x>0&&pos.x<W&&pos.y>0&&pos.y<H;
    if(inView){
      // 화면 중심에서 멀어지는 방향으로 가속
      var cx=W/2, cy=H/2;
      var dx=pos.x-cx, dy=pos.y-cy;
      var len=Math.sqrt(dx*dx+dy*dy)||1;
      arVx+=dx/len*0.3;
      arVy+=dy/len*0.3;
    }

    // 속도 제한
    var spd=a.speed||3;
    var vlen=Math.sqrt(arVx*arVx+arVy*arVy)||1;
    if(vlen>spd*2){arVx=arVx/vlen*spd*2;arVy=arVy/vlen*spd*2;}

    arWX+=arVx; arWY+=arVy;

    // 랜덤 방향 변화
    if(Math.random()<0.02){
      arVx+=(Math.random()-0.5)*spd;
      arVy+=(Math.random()-0.5)*spd;
    }
    updateARAnimal();
  },16);
}

function stopArMove(){
  if(arTimer){clearInterval(arTimer);arTimer=null;}
  if(arEscTimer){clearTimeout(arEscTimer);arEscTimer=null;}
  document.getElementById('ar-close-btn').style.display='none';
}

function startGyro(){
  if(!window.DeviceOrientationEvent)return;
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(r){
      if(r==='granted')window.addEventListener('deviceorientation',onGyro);
    }).catch(function(){});
  } else {
    window.addEventListener('deviceorientation',onGyro);
  }
}

function onGyro(e){
  if(lastGamma===null){lastGamma=e.gamma||0;lastBeta=e.beta||0;return;}
  gyroX+=(e.gamma-lastGamma)*4;
  gyroY+=(e.beta-lastBeta)*4;
  lastGamma=e.gamma; lastBeta=e.beta;
  updateARAnimal();
}

function stopGyro(){
  window.removeEventListener('deviceorientation',onGyro);
  lastGamma=null; lastBeta=null; gyroX=0; gyroY=0;
}

function confirmCapture(){
  if(!pendingCapture)return;
  stopArMove(); stopGyro();
  var id=pendingCapture; pendingCapture=null;
  // 포획 플래시
  var flash=document.getElementById('ar-flash');
  flash.style.transition='opacity 0.05s'; flash.style.opacity='1';
  setTimeout(function(){
    flash.style.transition='opacity 0.3s'; flash.style.opacity='0';
    setTimeout(function(){
      if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}
      document.getElementById('ar-screen').style.display='none';
      doCapture(id);
    },300);
  },80);
}

function closeAR(){
  stopArMove(); stopGyro();
  if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}
  document.getElementById('ar-screen').style.display='none';
  pendingCapture=null; cooldown=false;
  // 동물 다시 등장 - 같은 동물 재시도
  goScan();
}

// ── 포획 결과 ──
function doCapture(id){
  var a=ANIMALS[id];
  var isNew=player.caught.indexOf(id)===-1;
  if(isNew){player.caught.push(id);savePlayer();}
  setTopbars();
  var c=document.getElementById('cap-content');
  if(a.isMiss){
    var msgs=['바람만 쐤어요... 다음엔 잡을 수 있을 거예요!','나뭇잎만 흔들렸어요. 동물이 도망갔나봐요!','발자국만 남아있어요. 조금 늦었나봐요!','동물이 숨어버렸어요. 다른 곳을 찾아봐요!','땅굴로 도망갔어요! 다음엔 더 빨리 찾아봐요!'];
    c.innerHTML='<div class="already"><img src="logo.png" style="width:80px;height:80px;object-fit:contain;margin-bottom:8px"><p style="color:#e53935">동물을 놓쳤어요!</p><small>'+msgs[Math.floor(Math.random()*msgs.length)]+'</small></div>';
  } else if(isNew){
    c.innerHTML='<span class="sparkle">✨</span><span class="cap-emoji">'+a.emoji+'</span><div class="cap-title">'+a.name+' 포획!</div><div class="cap-desc">'+a.desc+'</div><div class="cap-new">🎉 새로운 동물 발견!</div>';
    var real=Object.keys(ANIMALS).filter(function(k){return !ANIMALS[k].isMiss;});
    var cReal=player.caught.filter(function(k){return !ANIMALS[k].isMiss;});
    if(cReal.length===real.length)setTimeout(function(){toast('🏆 모든 동물 포획 완료!');},600);
  } else {
    c.innerHTML='<div class="already"><span class="em">'+a.emoji+'</span><p>'+a.name+' - 이미 포획했어요!</p><small>다른 QR을 찾아보세요</small></div>';
  }
  show('s-capture');
}

// ── 도감 ──
function goDex(){
  stopCam(); stopArMove(); stopGyro();
  setTopbars();
  document.getElementById('dx-bar').textContent=player.caught.length+'마리 / '+Object.keys(ANIMALS).length+'마리 발견';
  var grid=document.getElementById('dex-grid');
  grid.innerHTML='';
  Object.entries(ANIMALS).forEach(function(entry,i){
    var id=entry[0], a=entry[1];
    var ok=player.caught.indexOf(id)!==-1;
    var div=document.createElement('div');
    div.className='dex-card'+(ok?' caught':' unknown');
    if(a.isMiss){
      div.innerHTML='<img src="logo.png" style="width:28px;height:28px;object-fit:contain;margin-bottom:2px;'+(ok?'':'filter:grayscale(1);opacity:.35')+'"><div class="dex-label">'+(ok?'놓쳤어요':'???')+'</div><div class="dex-num">No.'+String(i+1).padStart(2,'0')+'</div>';
    } else {
      div.innerHTML='<span class="dex-emoji">'+a.emoji+'</span><div class="dex-label">'+(ok?a.name:'???')+'</div><div class="dex-num">No.'+String(i+1).padStart(2,'0')+'</div>';
    }
    grid.appendChild(div);
  });
  show('s-dex');
}

function resetGame(){
  if(!confirm('처음부터 다시 시작할까요?'))return;
  stopCam(); stopArMove(); stopGyro();
  player=null; sessionStorage.clear();
  document.getElementById('name-input').value='';
  document.getElementById('ar-screen').style.display='none';
  show('s-start');
}

window.addEventListener('load',function(){show('s-start');});
</script>
