<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>교실 동물 탐험대</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f7ff;min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}
h1{font-size:26px;font-weight:700;color:#2d5be3;margin-bottom:8px;text-align:center}
h2{font-size:20px;font-weight:700;color:#2d5be3;margin-bottom:12px;text-align:center}
.sub{font-size:14px;color:#666;text-align:center;margin-bottom:20px;line-height:1.7}
input[type=text]{width:100%;max-width:300px;padding:14px;font-size:18px;border:2px solid #b3c9ff;border-radius:14px;outline:none;text-align:center;background:#fff}
input[type=text]:focus{border-color:#2d5be3}
.btn{padding:14px;font-size:16px;font-weight:700;border:none;border-radius:18px;cursor:pointer;margin-top:10px;width:100%;max-width:300px;display:block}
.btn-primary{background:#2d5be3;color:#fff}
.btn-secondary{background:#fff;color:#2d5be3;border:2px solid #2d5be3}
.btn-danger{background:#fff;color:#e53935;border:2px solid #e53935;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e0eaff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;width:100%;position:fixed;top:0;left:0;z-index:10}
.tb-name{font-size:14px;font-weight:700;color:#2d5be3}
.tb-count{font-size:13px;color:#666}
.has-topbar{padding-top:60px}
.cap-emoji{font-size:100px;animation:pop .5s ease-out;display:block;text-align:center;margin-bottom:4px}
@keyframes pop{0%{transform:scale(0) rotate(-15deg);opacity:0}70%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1);opacity:1}}
.cap-title{font-size:22px;font-weight:700;color:#2d5be3;text-align:center;margin-bottom:6px}
.cap-desc{font-size:14px;color:#666;text-align:center;max-width:260px;line-height:1.6;margin-bottom:6px}
.cap-new{font-size:13px;font-weight:700;color:#ff6b00;text-align:center;margin-bottom:16px}
.sparkle{font-size:28px;animation:spin 1.5s linear infinite;display:block;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.already{background:#fff3e0;border:2px solid #ffb74d;border-radius:14px;padding:16px;text-align:center;max-width:300px;width:100%;margin-bottom:16px}
.already .em{font-size:48px;display:block;margin-bottom:6px}
.already p{font-size:15px;color:#e65100;font-weight:700}
.already small{font-size:13px;color:#888}
.dex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:360px;margin-bottom:16px}
.dex-card{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;border:2px solid #e0eaff}
.dex-card.caught{border-color:#2d5be3;background:#f0f4ff}
.dex-card.unknown{filter:grayscale(1);opacity:.35}
.dex-emoji{font-size:32px;display:block;margin-bottom:4px}
.dex-label{font-size:12px;font-weight:700;color:#333}
.dex-num{font-size:11px;color:#aaa}
.count-bar{background:#e0eaff;border-radius:10px;padding:7px 16px;font-size:14px;font-weight:700;color:#2d5be3;margin-bottom:16px}
.guide-box{background:#fff;border:2px solid #b3c9ff;border-radius:14px;padding:16px;max-width:300px;width:100%;margin-bottom:16px;text-align:center}
.guide-box .icon{font-size:40px;margin-bottom:8px;display:block}
.guide-box p{font-size:14px;color:#444;line-height:1.7}
.guide-box strong{color:#2d5be3}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 시작 -->
<div class="screen active" id="s-start">
  <div style="font-size:60px;text-align:center;margin-bottom:10px">🌿</div>
  <h1>교실 동물 탐험대</h1>
  <p class="sub">교실 곳곳에 숨은 동물 친구들을<br>찾아서 포획해보세요!</p>
  <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="10">
  <button class="btn btn-primary" onclick="onStart()">탐험 시작!</button>
</div>

<!-- 탐험 안내 -->
<div class="screen has-topbar" id="s-hunt">
  <div class="topbar"><span class="tb-name" id="ht-name"></span><span class="tb-count" id="ht-count"></span></div>
  <h2>동물을 찾아라!</h2>
  <div class="guide-box">
    <span class="icon">📷</span>
    <p>교실에 붙어있는 <strong>QR 코드</strong>를<br>태블릿 <strong>기본 카메라</strong>로 찍으세요!<br><br>찍으면 자동으로<br>동물이 나타나요 🐾</p>
  </div>
  <button class="btn btn-secondary" onclick="goDex()">도감 보기</button>
  <button class="btn btn-danger" onclick="resetGame()" style="margin-top:10px">처음부터 다시 시작</button>
</div>

<!-- 포획 결과 -->
<div class="screen has-topbar" id="s-capture">
  <div class="topbar"><span class="tb-name" id="cp-name"></span><span class="tb-count" id="cp-count"></span></div>
  <div id="cap-content" style="width:100%;max-width:300px;text-align:center"></div>
  <button class="btn btn-primary" onclick="goHunt()">계속 탐험하기</button>
  <button class="btn btn-secondary" onclick="goDex()">도감 보기</button>
</div>

<!-- 도감 -->
<div class="screen has-topbar" id="s-dex">
  <div class="topbar"><span class="tb-name" id="dx-name"></span><span class="tb-count" id="dx-count"></span></div>
  <div style="width:100%;display:flex;flex-direction:column;align-items:center;padding:16px 16px 40px">
    <h2>내 동물 도감</h2>
    <div class="count-bar" id="dx-bar"></div>
    <div class="dex-grid" id="dex-grid"></div>
    <button class="btn btn-secondary" onclick="goHunt()">계속 탐험하기</button>
    <button class="btn btn-danger" onclick="resetGame()" style="margin-top:10px">처음부터 다시 시작</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ANIMALS={
  fox:{emoji:'🦊',name:'꼬미여우',desc:'장난꾸러기 여우! 꼬리가 아주 복슬복슬해요.'},
  rabbit:{emoji:'🐰',name:'토끼별',desc:'달에서 온 토끼. 귀가 엄청 길어요!'},
  penguin:{emoji:'🐧',name:'펭이',desc:'남극에서 온 친구. 춤을 아주 잘 춰요!'},
  frog:{emoji:'🐸',name:'초록이',desc:'연못의 수호자! 점프 실력이 최고예요.'},
  bear:{emoji:'🐻',name:'구름곰',desc:'구름 위에서 내려온 포근한 곰.'},
  cat:{emoji:'🐱',name:'냥냥이',desc:'새침하지만 사실 엄청 친해지고 싶어요.'},
  star:{emoji:'🦄',name:'반짝이',desc:'별빛으로 만들어진 신비로운 유니콘!'},
  octopus:{emoji:'🐙',name:'문어몽',desc:'다리가 8개! 뭐든 척척 잡아드려요.'}
};
const KEY='adg_v8';

function load(){try{return JSON.parse(localStorage.getItem(KEY))||null;}catch(e){return null;}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function countTxt(d){return (d.caught||[]).length+'/'+Object.keys(ANIMALS).length+' 포획';}
function setTopbars(d){
  [['ht','s-hunt'],['cp','s-capture'],['dx','s-dex']].forEach(([p])=>{
    const n=document.getElementById(p+'-name');
    const c=document.getElementById(p+'-count');
    if(n)n.textContent=d.name+'의 탐험';
    if(c)c.textContent=countTxt(d);
  });
}

function onStart(){
  const n=document.getElementById('name-input').value.trim();
  if(!n){toast('이름을 입력해 주세요!');return;}
  // 이름 바뀌면 초기화, 같으면 유지
  const prev=load();
  let d;
  if(prev&&prev.name===n){d=prev;}
  else{d={name:n,caught:[]};}
  save(d);
  setTopbars(d);
  goHunt();
}

function goHunt(){
  const d=load();
  if(!d){show('s-start');return;}
  setTopbars(d);
  show('s-hunt');
}

function goDex(){
  const d=load();
  if(!d){show('s-start');return;}
  setTopbars(d);
  document.getElementById('dx-bar').textContent=(d.caught||[]).length+'마리 / '+Object.keys(ANIMALS).length+'마리 발견';
  const grid=document.getElementById('dex-grid');
  grid.innerHTML='';
  Object.entries(ANIMALS).forEach(([id,a],i)=>{
    const ok=(d.caught||[]).includes(id);
    const div=document.createElement('div');
    div.className='dex-card'+(ok?' caught':' unknown');
    div.innerHTML=`<span class="dex-emoji">${a.emoji}</span><div class="dex-label">${ok?a.name:'???'}</div><div class="dex-num">No.${String(i+1).padStart(2,'0')}</div>`;
    grid.appendChild(div);
  });
  show('s-dex');
}

function doCapture(id,d){
  const a=ANIMALS[id];
  const isNew=!(d.caught||[]).includes(id);
  if(isNew){d.caught.push(id);save(d);}
  setTopbars(d);
  const c=document.getElementById('cap-content');
  if(isNew){
    c.innerHTML=`
      <span class="sparkle">✨</span>
      <span class="cap-emoji">${a.emoji}</span>
      <div class="cap-title">${a.name} 포획!</div>
      <div class="cap-desc">${a.desc}</div>
      <div class="cap-new">🎉 새로운 동물 발견!</div>`;
    if(d.caught.length===Object.keys(ANIMALS).length)
      setTimeout(()=>toast('🏆 모든 동물 포획 완료!'),600);
  }else{
    c.innerHTML=`
      <div class="already">
        <span class="em">${a.emoji}</span>
        <p>${a.name} - 이미 포획했어요!</p>
        <small>다른 QR을 찾아보세요</small>
      </div>`;
  }
  show('s-capture');
}

function resetGame(){
  if(!confirm('처음부터 다시 시작할까요?'))return;
  try{localStorage.removeItem(KEY);}catch(e){}
  document.getElementById('name-input').value='';
  show('s-start');
}

// 페이지 로드 시 animal 파라미터 처리
window.addEventListener('load',()=>{
  const animal=new URLSearchParams(location.search).get('animal');
  const d=load();
  if(animal&&ANIMALS[animal]){
    if(d&&d.name){
      doCapture(animal,d);
    } else {
      // 이름 없으면 시작화면 + 파라미터 기억
      show('s-start');
    }
  } else if(d&&d.name){
    goHunt();
  } else {
    show('s-start');
  }
});
</script>
</body>
</html>
